name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & publish binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build standalone binaries (all targets)
        run: bun run build

      - name: Checksums
        working-directory: dist
        run: shasum -a 256 claudeplex-* > SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/claudeplex-*
            dist/SHA256SUMS.txt
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Bump Homebrew tap formula
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
        run: |
          if [ -z "$DEPLOY_KEY" ]; then
            echo "HOMEBREW_TAP_DEPLOY_KEY not set — skipping formula bump"; exit 0
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          VERSION="${GITHUB_REF_NAME#v}"
          bun run scripts/formula.ts "$VERSION" dist/SHA256SUMS.txt > formula.rb
          git clone git@github.com:byte5ai/homebrew-tap.git tap
          mkdir -p tap/Formula
          cp formula.rb tap/Formula/claudeplex.rb
          cd tap
          git config user.name "claudeplex-release-bot"
          git config user.email "actions@users.noreply.github.com"
          git add Formula/claudeplex.rb
          git diff --cached --quiet || git commit -m "claudeplex ${VERSION}"
          git push
